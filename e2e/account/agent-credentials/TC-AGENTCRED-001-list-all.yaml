id: TC-AGENTCRED-001
name: 列出所有 Agent 凭证
description: 验证 GET /users/agent-credentials 返回用户的所有 Agent 凭证配置
priority: high
module: account/agent-credentials

preconditions:
  - 开发环境已启动
  - 已获取有效的 access_token

steps:
  - action: 登录获取 token
    expected: 返回 200，获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  - action: 列出所有 Agent 凭证
    expected: 返回 200，包含 items 数组（按 agent 类型分组）
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/users/agent-credentials
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          items: not_empty

  - action: 不带 token 列出凭证
    expected: 返回 401 未授权
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/users/agent-credentials
      expected:
        status: 401
