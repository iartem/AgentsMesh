id: TC-REPOPROV-005
name: 设置默认仓库提供商
description: 验证将仓库提供商设为默认
priority: medium
module: account/repository-providers

preconditions:
  - 开发环境已启动
  - 已获取有效的 access_token

steps:
  - action: 登录获取 token
    expected: 返回 200，获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  - action: 创建测试提供商
    expected: 返回 201，获取提供商 ID
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/users/repository-providers
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          provider_type: github
          name: Default Test Provider
          base_url: https://api.github.com
          bot_token: ghp_default_test_token
      expected:
        status: 201
        body:
          provider:
            id: not_empty
      save:
        provider_id: body.provider.id

  - action: 设置为默认提供商
    expected: 返回 200
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/users/repository-providers/{provider_id}/default
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          message: contains "Default"

  - action: 验证数据库已更新
    verification:
      type: database
      query: |
        SELECT is_default FROM user_repository_providers WHERE name = 'Default Test Provider'
      expected:
        is_default: true

cleanup:
  - sql: |
      DELETE FROM user_repository_providers WHERE name = 'Default Test Provider';
