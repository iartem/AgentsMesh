id: TC-PROF-006
name: 用户设置完整流程（导航 → 修改 → 保存 → 验证）
description: |
  验证用户通过 UI 完整修改个人设置的流程：
  1. 登录并导航到用户设置页面
  2. 修改用户名称
  3. 保存并验证变更生效
  4. 修改密码
  5. 验证新密码可以登录
priority: high
module: account/profile
type: scenario

preconditions:
  - 开发环境已启动
  - 测试用户存在

setup:
  sql: |
    -- 创建专用测试用户，避免影响其他测试
    DELETE FROM organization_members WHERE user_id IN (SELECT id FROM users WHERE email = 'settings-test@test.local');
    DELETE FROM users WHERE email = 'settings-test@test.local';

    INSERT INTO users (email, username, name, password_hash, is_email_verified, created_at, updated_at)
    VALUES (
      'settings-test@test.local',
      'settingsuser',
      'Original Name',
      '$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZRGdjGj/n3.QB/nVq7vDsVL0SPKFO',  -- password: devpass123
      true,
      NOW(),
      NOW()
    );

steps:
  - id: step-1
    action: 登录测试用户
    url: /login
    verification:
      type: ui
      steps:
        - fill: 'textbox "邮箱" or textbox "Email"'
          value: settings-test@test.local
        - fill: 'textbox "密码" or textbox "Password"'
          value: devpass123
        - click: 'button contains "登录" or button contains "Sign in" or button contains "Login"'
      check:
        - one_of:
            - url_contains: "/workspace"
            - url_contains: "/onboarding"

  - id: step-2
    action: 如果在 onboarding，先完成 onboarding
    verification:
      type: ui
      conditional: url_contains "/onboarding"
      steps:
        - click: 'button contains "创建个人" or button contains "Create Personal"'
      after_check:
        - wait: 2000
        - click: 'button contains "跳过" or button contains "Skip"'
          optional: true

  - id: step-3
    action: 导航到用户设置页面
    url: /settings/profile
    verification:
      type: ui
      check:
        - one_of:
            - exists: 'heading contains "个人资料" or heading contains "Profile"'
            - exists: 'textbox "姓名" or textbox "Name"'

  - id: step-4
    action: 修改用户名称
    verification:
      type: ui
      steps:
        - clear: 'textbox "姓名" or textbox "Name" or textbox "显示名称"'
        - fill: 'textbox "姓名" or textbox "Name" or textbox "显示名称"'
          value: Updated Name Via UI
        - click: 'button contains "保存" or button contains "Save" or button contains "更新"'
      check:
        - one_of:
            - contains: "保存成功"
            - contains: "saved"
            - contains: "updated"

  - id: step-5
    action: 验证数据库中名称已更新
    verification:
      type: database
      query: |
        SELECT name FROM users WHERE email = 'settings-test@test.local'
      expected:
        name: Updated Name Via UI

  - id: step-6
    action: 导航到安全设置页面修改密码
    url: /settings/security
    verification:
      type: ui
      check:
        - one_of:
            - exists: 'heading contains "安全" or heading contains "Security"'
            - exists: 'heading contains "密码" or heading contains "Password"'
            - exists: 'textbox "当前密码" or textbox "Current"'

  - id: step-7
    action: 修改密码
    verification:
      type: ui
      steps:
        - fill: 'textbox "当前密码" or textbox "Current Password" or textbox "旧密码"'
          value: devpass123
        - fill: 'textbox "新密码" or textbox "New Password"'
          value: NewSettingsPass123!
        - fill: 'textbox "确认密码" or textbox "Confirm"'
          value: NewSettingsPass123!
          optional: true
        - click: 'button contains "更新密码" or button contains "Change Password" or button contains "保存"'
      check:
        - one_of:
            - contains: "密码已更新"
            - contains: "password changed"
            - contains: "成功"

  - id: step-8
    action: 登出
    verification:
      type: ui
      steps:
        - click: 'button contains user avatar or button contains "设置"'
          optional: true
        - click: 'menuitem "登出" or menuitem "Sign out" or menuitem "Logout" or button "登出"'
      check:
        - url_contains: "/login"

  - id: step-9
    action: 使用新密码重新登录
    verification:
      type: ui
      steps:
        - fill: 'textbox "邮箱" or textbox "Email"'
          value: settings-test@test.local
        - fill: 'textbox "密码" or textbox "Password"'
          value: NewSettingsPass123!
        - click: 'button contains "登录" or button contains "Sign in"'
      check:
        - one_of:
            - url_contains: "/workspace"
            - contains: "Updated Name Via UI"

  - id: step-10
    action: 验证旧密码无法登录
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: settings-test@test.local
          password: devpass123
      expected:
        status: 401

cleanup:
  - sql: |
      DELETE FROM organization_members WHERE user_id IN (SELECT id FROM users WHERE email = 'settings-test@test.local');
      DELETE FROM organizations WHERE id IN (
        SELECT o.id FROM organizations o
        JOIN organization_members om ON o.id = om.organization_id
        JOIN users u ON om.user_id = u.id
        WHERE u.email = 'settings-test@test.local'
      );
      DELETE FROM users WHERE email = 'settings-test@test.local';
