id: TC-PROF-003
name: 修改密码成功
description: 验证使用正确的当前密码可以修改密码
priority: high
module: account/profile

preconditions:
  - 开发环境已启动
  - 已获取有效的 access_token

setup:
  sql: |
    INSERT INTO users (email, username, password_hash, name, is_email_verified)
    VALUES ('pwchange-e2e@test.local', 'pwchangee2e', '$2a$10$jsdntE/5H3DCPYVPZq10o.CJr1WKL4Nxei/jQcLwIfobSjwFuoo/S', 'PW Change User', true)
    ON CONFLICT (email) DO UPDATE SET
      password_hash = '$2a$10$jsdntE/5H3DCPYVPZq10o.CJr1WKL4Nxei/jQcLwIfobSjwFuoo/S';

notes: |
  默认密码哈希对应 'password123'

steps:
  - action: 登录测试用户
    expected: 返回 200，获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: pwchange-e2e@test.local
          password: password123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  - action: 修改密码
    expected: 返回 200，密码修改成功
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/users/me/password
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          current_password: password123
          new_password: NewPassword456!
      expected:
        status: 200
        body:
          message: contains "changed"

  - action: 使用新密码登录验证
    expected: 返回 200，新密码有效
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: pwchange-e2e@test.local
          password: NewPassword456!
      expected:
        status: 200
        body:
          token: not_empty

cleanup:
  - sql: |
      DELETE FROM users WHERE email = 'pwchange-e2e@test.local';
