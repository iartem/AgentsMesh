id: TC-PROF-004
name: 修改密码失败-当前密码错误
description: 验证使用错误的当前密码时返回 401 错误
priority: high
module: account/profile

preconditions:
  - 开发环境已启动
  - 已获取有效的 access_token

steps:
  - action: 登录获取 token
    expected: 返回 200，获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  - action: 使用错误的当前密码修改密码
    expected: 返回 401，错误信息为 "Current password is incorrect"
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/users/me/password
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          current_password: wrongpassword
          new_password: NewPassword456!
      expected:
        status: 401
        body:
          error: contains "incorrect"

  - action: 提交空的当前密码
    expected: 返回 400，参数错误
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/users/me/password
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          current_password: ""
          new_password: NewPassword456!
      expected:
        status: 400
        body:
          error: not_empty
