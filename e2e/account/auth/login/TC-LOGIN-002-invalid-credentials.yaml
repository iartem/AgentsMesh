id: TC-LOGIN-002
name: 登录失败-凭证无效
description: 验证使用错误密码登录时返回 401 未授权错误
priority: high
module: account/auth/login

preconditions:
  - 开发环境已启动
  - 测试用户存在 (dev@agentsmesh.local)

steps:
  - action: 使用错误密码调用登录 API
    expected: 返回 401，错误信息为 "Invalid email or password"
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: wrongpassword123
      expected:
        status: 401
        body:
          error: contains "Invalid"
