id: TC-TOKEN-002
name: Token 刷新失败-无效 token
description: 验证使用无效的 refresh_token 时返回 401 错误
priority: high
module: account/auth/token

preconditions:
  - 开发环境已启动

steps:
  - action: 使用无效的 refresh_token 调用刷新 API
    expected: 返回 401，错误信息为 "Invalid refresh token"
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/refresh
        headers:
          Content-Type: application/json
        body:
          refresh_token: "invalid-refresh-token-12345"
      expected:
        status: 401
        body:
          error: contains "Invalid"

  - action: 提交空的 refresh_token
    expected: 返回 400，错误信息包含 refresh_token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/refresh
        headers:
          Content-Type: application/json
        body:
          refresh_token: ""
      expected:
        status: 400
        body:
          error: not_empty
