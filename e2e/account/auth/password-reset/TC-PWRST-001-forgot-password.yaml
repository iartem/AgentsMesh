id: TC-PWRST-001
name: 请求密码重置
description: 验证忘记密码 API 正常工作，发送重置链接
priority: high
module: account/auth/password-reset

preconditions:
  - 开发环境已启动
  - 测试用户存在 (dev@agentsmesh.local)

steps:
  - action: 请求密码重置
    expected: 返回 200，消息表示已发送重置链接
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/forgot-password
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
      expected:
        status: 200
        body:
          message: not_empty

  - action: 使用不存在的邮箱请求密码重置
    expected: 返回 200，但不透露邮箱是否存在（安全考虑）
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/forgot-password
        headers:
          Content-Type: application/json
        body:
          email: nonexistent@test.local
      expected:
        status: 200
        body:
          message: not_empty
