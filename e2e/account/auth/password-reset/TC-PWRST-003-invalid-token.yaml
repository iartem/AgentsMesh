id: TC-PWRST-003
name: 重置密码失败-无效 token
description: 验证使用无效或过期 token 时返回错误
priority: high
module: account/auth/password-reset

preconditions:
  - 开发环境已启动

steps:
  - action: 使用无效 token 重置密码
    expected: 返回 400，错误信息为 "Invalid or expired reset token"
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/reset-password
        headers:
          Content-Type: application/json
        body:
          token: invalid-reset-token-xyz
          new_password: NewTestPass456!
      expected:
        status: 400
        body:
          error: contains "Invalid"

  - action: 提交空 token
    expected: 返回 400，错误信息包含 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/reset-password
        headers:
          Content-Type: application/json
        body:
          token: ""
          new_password: NewTestPass456!
      expected:
        status: 400
        body:
          error: not_empty

  - action: 提交短密码
    expected: 返回 400，错误信息包含密码长度要求
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/reset-password
        headers:
          Content-Type: application/json
        body:
          token: some-token
          new_password: "123"
      expected:
        status: 400
        body:
          error: not_empty
