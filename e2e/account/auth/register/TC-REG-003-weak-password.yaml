id: TC-REG-003
name: 注册失败-密码太弱
description: 验证使用短密码注册时返回 400 请求错误
priority: medium
module: account/auth/register

preconditions:
  - 开发环境已启动

steps:
  - action: 使用短密码调用注册 API
    expected: 返回 400，错误信息包含密码长度要求
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/register
        headers:
          Content-Type: application/json
        body:
          email: weakpwd@test.local
          username: weakpwduser
          password: "123"
          name: Weak Password User
      expected:
        status: 400
        body:
          error: not_empty

  - action: 使用空用户名调用注册 API
    expected: 返回 400，错误信息包含用户名要求
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/register
        headers:
          Content-Type: application/json
        body:
          email: emptyuser@test.local
          username: "ab"
          password: TestPass123!
          name: Short Username
      expected:
        status: 400
        body:
          error: not_empty
