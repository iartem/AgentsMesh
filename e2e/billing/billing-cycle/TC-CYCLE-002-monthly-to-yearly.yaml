id: TC-CYCLE-002
name: 从月付切换到年付
description: 验证从月付切换到年付的流程
priority: high
module: billing/billing-cycle

preconditions:
  - 组织当前为月付订阅 (billing_cycle = 'monthly')

setup:
  sql: |
    UPDATE subscriptions
    SET billing_cycle = 'monthly', next_billing_cycle = NULL
    WHERE organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org')

steps:
  - action: 导航到账单设置页面
    url: /dev-org/settings?scope=organization&tab=billing
    expected: 页面加载完成
    verification:
      type: ui

  - action: 验证初始状态
    expected: "月付"按钮为禁用状态，"年付"按钮可点击
    verification:
      type: ui
      check:
        - exists: 'button "月付" disabled'

  - action: 点击"年付 省17%"按钮
    selector: 'button contains "年付"'
    expected: 按钮状态变化
    verification:
      type: ui

  - action: 验证数据库更新
    expected: next_billing_cycle 设置为 'yearly'
    verification:
      type: database
      query: |
        SELECT billing_cycle, next_billing_cycle
        FROM subscriptions
        WHERE organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org')
      expected:
        billing_cycle: monthly
        next_billing_cycle: yearly

  - action: 验证成功消息
    expected: 显示"计费周期已成功更改"成功消息
    verification:
      type: ui
      check:
        - contains_one_of: ["计费周期已成功更改", "Billing cycle changed successfully"]

cleanup:
  - sql: |
      UPDATE subscriptions
      SET billing_cycle = 'monthly', next_billing_cycle = NULL
      WHERE organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org')
