id: TC-SUB-004
name: 立即取消订阅
description: 验证立即取消订阅功能，订阅状态变为 canceled
priority: high
module: billing/subscription

preconditions:
  - 组织有活跃的付费订阅
  - 订阅状态为 active

setup:
  sql: |
    UPDATE subscriptions
    SET status = 'active', cancel_at_period_end = false, canceled_at = NULL
    WHERE organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org')

steps:
  - action: 导航到账单设置页面
    url: /dev-org/settings?scope=organization&tab=billing
    expected: 页面加载完成
    verification:
      type: ui

  - action: 点击"取消订阅"按钮
    selector: 'button "取消订阅"'
    expected: 打开取消订阅确认对话框
    verification:
      type: ui
      check:
        - exists: 'heading "取消订阅"'

  - action: 选择"立即取消"选项
    selector: 'radio "立即取消"'
    expected: 选项被选中，显示警告信息
    verification:
      type: ui

  - action: 点击"确认取消"按钮
    selector: 'button "确认取消"'
    expected: 对话框关闭，订阅状态变为 canceled
    verification:
      type: database
      query: |
        SELECT status, canceled_at
        FROM subscriptions
        WHERE organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org')
      expected:
        status: canceled
        canceled_at: not_null

  - action: 验证 UI 状态更新
    expected: 状态标签显示"已取消"，显示"重新订阅"按钮
    verification:
      type: ui
      check:
        - contains_one_of: ["已取消", "Canceled"]
        - exists: 'button "重新订阅"'
        - not_exists: 'button "取消订阅"'

cleanup:
  - sql: |
      UPDATE subscriptions
      SET status = 'active', canceled_at = NULL, cancel_at_period_end = false
      WHERE organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org')
