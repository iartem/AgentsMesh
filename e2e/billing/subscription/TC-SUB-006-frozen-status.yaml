id: TC-SUB-006
name: 验证冻结状态 UI
description: 验证订阅冻结状态下的 UI 显示
priority: medium
module: billing/subscription

preconditions:
  - 组织有付费订阅

setup:
  sql: |
    UPDATE subscriptions
    SET status = 'frozen', frozen_at = NOW()
    WHERE organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org')

steps:
  - action: 导航到账单设置页面
    url: /dev-org/settings?scope=organization&tab=billing
    expected: 页面加载完成
    verification:
      type: ui

  - action: 验证冻结状态显示
    expected: 状态标签显示"已冻结"
    verification:
      type: ui
      check:
        - contains_one_of: ["已冻结", "Frozen"]

  - action: 验证按钮状态
    expected: 显示"重新订阅"按钮，不显示"取消订阅"
    verification:
      type: ui
      check:
        - exists: 'button "重新订阅"'
        - not_exists: 'button "取消订阅"'

cleanup:
  - sql: |
      UPDATE subscriptions
      SET status = 'active', frozen_at = NULL
      WHERE organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org')
