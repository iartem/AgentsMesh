id: TC-SUB-005
name: 恢复待取消的订阅
description: 验证恢复已标记为周期结束后取消的订阅
priority: medium
module: billing/subscription

preconditions:
  - 组织有活跃订阅
  - cancel_at_period_end = true

setup:
  sql: |
    UPDATE subscriptions
    SET status = 'active', cancel_at_period_end = true
    WHERE organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org')

steps:
  - action: 导航到账单设置页面
    url: /dev-org/settings?scope=organization&tab=billing
    expected: 页面加载完成
    verification:
      type: ui

  - action: 验证初始状态
    expected: 显示"恢复订阅"按钮
    verification:
      type: ui
      check:
        - exists: 'button "恢复订阅"'

  - action: 点击"恢复订阅"按钮
    selector: 'button "恢复订阅"'
    expected: 显示成功消息
    verification:
      type: database
      query: |
        SELECT cancel_at_period_end
        FROM subscriptions
        WHERE organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org')
      expected:
        cancel_at_period_end: false

  - action: 验证 UI 状态更新
    expected: 显示"取消订阅"按钮，不再显示"恢复订阅"
    verification:
      type: ui
      check:
        - exists: 'button "取消订阅"'
        - not_exists: 'button "恢复订阅"'

cleanup:
  - sql: |
      UPDATE subscriptions
      SET cancel_at_period_end = false
      WHERE organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org')
