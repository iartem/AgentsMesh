id: TC-PLAN-003
name: 降级方案 Pro 到 Free
description: 验证从 Pro 降级到 Free 方案（周期结束后生效）
priority: high
module: billing/plan-change

preconditions:
  - 组织当前为 Pro 计划
  - 订阅处于活跃状态
  - 已获取有效的 access_token

setup:
  sql: |
    -- 确保组织为 Pro 计划，席位数为 1（满足 Free 限制）
    UPDATE subscriptions
    SET plan_id = (SELECT id FROM subscription_plans WHERE name = 'pro'),
        status = 'active',
        seat_count = 1,
        downgrade_to_plan = NULL,
        current_period_end = NOW() + INTERVAL '15 days'
    WHERE organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org');

steps:
  - action: 调用降级方案 API
    expected: 返回成功，设置周期结束后降级
    verification:
      type: api
      request:
        method: PUT
        url: /api/v1/orgs/dev-org/billing/subscription
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          plan_name: free
      expected:
        status: 200
        body:
          message: contains_one_of ["周期结束后生效", "period end", "scheduled"]

  - action: 验证降级已安排
    expected: downgrade_to_plan 字段已设置
    verification:
      type: database
      query: |
        SELECT
          sp.name as current_plan,
          s.downgrade_to_plan,
          s.status
        FROM subscriptions s
        JOIN subscription_plans sp ON s.plan_id = sp.id
        WHERE s.organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org')
      expected:
        current_plan: pro
        downgrade_to_plan: free
        status: active
