id: TC-UI-002
name: 添加 Runner 对话框
description: 验证添加 Runner 对话框正确显示注册命令和令牌
priority: critical
must_execute: true  # 🚨 UI 测试禁止跳过，必须使用 MCP Chrome DevTools 执行
module: runner/ui
tags:
  - ui
  - browser
  - mcp-required

preconditions:
  - 开发环境已启动
  - 浏览器可访问
  - 组织 dev-org 存在
  - 用户已登录

steps:
  - action: 打开登录页面并登录
    expected: 登录成功
    verification:
      type: ui
      navigate: /login
      actions:
        - fill:
            selector: 'input[type="email"]'
            value: dev@agentsmesh.local
        - fill:
            selector: 'input[type="password"]'
            value: devpass123
        - click:
            selector: 'button[type="submit"]'
      wait_for: Runner

  - action: 导航到 Runner 管理页面
    expected: 显示 Runner 列表页面
    verification:
      type: ui
      navigate: /dev-org/runners
      wait_for: Runner

  - action: 点击添加 Runner 按钮
    expected: 打开添加 Runner 对话框
    verification:
      type: ui
      actions:
        - click:
            text: 添加 Runner
      wait_for: 注册

  - action: 验证对话框内容
    expected: 对话框显示注册说明和命令
    verification:
      type: ui
      snapshot: true
      check:
        - contains: 注册
        - contains: runner register
        - exists: 'button' # 复制按钮

  - action: 验证生成注册令牌按钮
    expected: 页面包含生成令牌选项
    verification:
      type: ui
      check:
        - contains: 令牌

  - action: 关闭对话框
    expected: 对话框关闭
    verification:
      type: ui
      actions:
        - press_key: Escape
      check:
        - not_exists: 'dialog[open]'
