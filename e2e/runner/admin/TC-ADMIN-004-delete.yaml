id: TC-ADMIN-004
name: Admin 删除 Runner
description: 验证 DELETE /api/v1/admin/runners/:id 删除 Runner
priority: high
module: runner/admin

preconditions:
  - 开发环境已启动
  - 已获取有效的 admin access_token（is_system_admin = true）

setup:
  sql: |
    -- 确保 admin 用户有 system_admin 权限
    UPDATE users SET is_system_admin = true WHERE email = 'admin@agentsmesh.local';

    -- 创建测试 Runner
    INSERT INTO runners (organization_id, node_id, name, description, status, max_pods, disabled, created_at, updated_at)
    SELECT o.id, 'admin-delete-test-runner', 'Admin Delete Test Runner', 'Admin 删除测试 Runner', 'offline', 5, false, NOW(), NOW()
    FROM organizations o
    WHERE o.slug = 'dev-org'
    ON CONFLICT (organization_id, node_id) DO NOTHING;

steps:
  - action: Admin 用户登录获取 token
    expected: 返回 200，获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: admin@agentsmesh.local
          password: adminpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        admin_token: body.token

  - action: 获取测试 Runner ID
    expected: 获取 Runner ID
    verification:
      type: database
      query: |
        SELECT id FROM runners
        WHERE node_id = 'admin-delete-test-runner'
          AND organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org');
      expected:
        rows: 1
      save:
        runner_id: rows[0].id

  - action: 验证 Runner 存在
    expected: 返回 200，Runner 存在
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/admin/runners/{runner_id}
        headers:
          Authorization: Bearer {admin_token}
      expected:
        status: 200

  - action: 删除 Runner
    expected: 返回 204 成功删除
    verification:
      type: api
      request:
        method: DELETE
        url: /api/v1/admin/runners/{runner_id}
        headers:
          Authorization: Bearer {admin_token}
      expected:
        status: 204

  - action: 验证 Runner 已删除
    expected: 返回 404 不存在
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/admin/runners/{runner_id}
        headers:
          Authorization: Bearer {admin_token}
      expected:
        status: 404

  - action: 验证数据库中 Runner 已删除
    expected: 数据库中不存在该 Runner
    verification:
      type: database
      query: |
        SELECT COUNT(*) as count FROM runners
        WHERE node_id = 'admin-delete-test-runner'
          AND organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org');
      expected:
        count: 0

  - action: 删除不存在的 Runner
    expected: 返回 404 不存在
    verification:
      type: api
      request:
        method: DELETE
        url: /api/v1/admin/runners/99999
        headers:
          Authorization: Bearer {admin_token}
      expected:
        status: 404

cleanup:
  - sql: |
      DELETE FROM runners WHERE node_id = 'admin-delete-test-runner';
