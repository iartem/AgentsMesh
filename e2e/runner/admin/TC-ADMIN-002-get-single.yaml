id: TC-ADMIN-002
name: Admin 获取单个 Runner
description: 验证 GET /api/v1/admin/runners/:id 返回指定 Runner 的详细信息
priority: high
module: runner/admin

preconditions:
  - 开发环境已启动
  - 已获取有效的 admin access_token（is_system_admin = true）

setup:
  sql: |
    -- 确保 admin 用户有 system_admin 权限
    UPDATE users SET is_system_admin = true WHERE email = 'admin@agentsmesh.local';

    -- 创建测试 Runner
    INSERT INTO runners (organization_id, node_id, name, description, status, max_pods, disabled, created_at, updated_at)
    SELECT o.id, 'admin-single-test-runner', 'Admin Single Test Runner', 'Admin 单个 Runner 测试', 'offline', 5, false, NOW(), NOW()
    FROM organizations o
    WHERE o.slug = 'dev-org'
    ON CONFLICT (organization_id, node_id) DO NOTHING;

steps:
  - action: Admin 用户登录获取 token
    expected: 返回 200，获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: admin@agentsmesh.local
          password: adminpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        admin_token: body.token

  - action: 获取测试 Runner ID
    expected: 获取 Runner ID
    verification:
      type: database
      query: |
        SELECT id FROM runners
        WHERE node_id = 'admin-single-test-runner'
          AND organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org');
      expected:
        rows: 1
      save:
        runner_id: rows[0].id

  - action: 获取单个 Runner 详情
    expected: 返回 200，包含完整 Runner 信息
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/admin/runners/{runner_id}
        headers:
          Authorization: Bearer {admin_token}
      expected:
        status: 200
        body:
          id: not_empty
          node_id: admin-single-test-runner
          name: Admin Single Test Runner
          status: offline

  - action: 获取不存在的 Runner
    expected: 返回 404 不存在
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/admin/runners/99999
        headers:
          Authorization: Bearer {admin_token}
      expected:
        status: 404

cleanup:
  - sql: |
      DELETE FROM runners WHERE node_id = 'admin-single-test-runner';
