id: TC-DELETE-001
name: 删除 Runner
description: 验证 DELETE /orgs/:slug/runners/:id 删除 Runner
priority: high
module: runner/delete

preconditions:
  - 开发环境已启动
  - 已获取有效的 access_token（需要 admin/owner 权限）
  - 组织 dev-org 存在

setup:
  sql: |
    -- 创建测试 Runner
    INSERT INTO runners (organization_id, node_id, name, description, status, max_pods, created_at, updated_at)
    SELECT o.id, 'test-runner-delete', 'Delete Test Runner', '删除测试用 Runner', 'offline', 5, NOW(), NOW()
    FROM organizations o
    WHERE o.slug = 'dev-org'
    ON CONFLICT (organization_id, node_id) DO NOTHING;

steps:
  - action: 登录获取 token
    expected: 返回 200，获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  - action: 获取测试 Runner ID
    expected: 返回 200，获取 Runner ID
    verification:
      type: database
      query: |
        SELECT id FROM runners
        WHERE node_id = 'test-runner-delete'
          AND organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org');
      expected:
        rows: 1
      save:
        runner_id: rows[0].id

  - action: 验证 Runner 存在
    expected: 返回 200，Runner 存在
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/runners/{runner_id}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          id: not_empty

  - action: 删除 Runner
    expected: 返回 204 成功删除
    verification:
      type: api
      request:
        method: DELETE
        url: /api/v1/orgs/dev-org/runners/{runner_id}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 204

  - action: 验证 Runner 已删除
    expected: 返回 404 不存在
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/runners/{runner_id}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 404

  - action: 验证数据库中 Runner 已删除
    expected: 数据库中不存在该 Runner
    verification:
      type: database
      query: |
        SELECT COUNT(*) as count FROM runners
        WHERE node_id = 'test-runner-delete'
          AND organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org');
      expected:
        count: 0

  - action: 再次删除同一 Runner
    expected: 返回 404 不存在
    verification:
      type: api
      request:
        method: DELETE
        url: /api/v1/orgs/dev-org/runners/{runner_id}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 404

  - action: 删除不存在的 Runner
    expected: 返回 404 不存在
    verification:
      type: api
      request:
        method: DELETE
        url: /api/v1/orgs/dev-org/runners/99999
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 404

  - action: 不带 token 删除 Runner
    expected: 返回 401 未授权
    verification:
      type: api
      request:
        method: DELETE
        url: /api/v1/orgs/dev-org/runners/1
      expected:
        status: 401

cleanup:
  - sql: |
      DELETE FROM runners WHERE node_id = 'test-runner-delete';
