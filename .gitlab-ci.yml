# =============================================================================
# Deploy Stage - Per-service manual deployment to production
# =============================================================================
# Each service has its own deploy job with manual trigger (Play button).
# DEPLOY_VERSION defaults to CI_COMMIT_SHORT_SHA but can be overridden for rollback.
#
# Usage:
#   - Normal deploy: Click Play button, uses current commit SHA
#   - Rollback: Click Play ▼, modify DEPLOY_VERSION to target SHA, run

# Deploy Backend to China Production
deploy:cn-prod:backend:
  stage: deploy
  needs:
    - job: build-backend
  tags:
    - deploy
    - linux
  variables:
    DEPLOY_VERSION: "${CI_COMMIT_SHORT_SHA}"
  environment:
    name: cn-production
    url: https://agentsmesh.cn
  script:
    - echo "Deploying Backend ${DEPLOY_VERSION} to China Production..."
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && git pull origin main"
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && ./deploy.sh cn-prod --service backend --version ${DEPLOY_VERSION}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - backend/**/*
        - proto/**/*
      when: manual

# Deploy Web to China Production
deploy:cn-prod:web:
  stage: deploy
  needs:
    - job: build-web
  tags:
    - deploy
    - linux
  variables:
    DEPLOY_VERSION: "${CI_COMMIT_SHORT_SHA}"
  environment:
    name: cn-production
    url: https://agentsmesh.cn
  script:
    - echo "Deploying Web ${DEPLOY_VERSION} to China Production..."
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && git pull origin main"
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && ./deploy.sh cn-prod --service web --version ${DEPLOY_VERSION}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - web/**/*
      when: manual

# Deploy Web-Admin to China Production
deploy:cn-prod:web-admin:
  stage: deploy
  needs:
    - job: build-web-admin
  tags:
    - deploy
    - linux
  variables:
    DEPLOY_VERSION: "${CI_COMMIT_SHORT_SHA}"
  environment:
    name: cn-production
    url: https://admin.agentsmesh.cn
  script:
    - echo "Deploying Web-Admin ${DEPLOY_VERSION} to China Production..."
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && git pull origin main"
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && ./deploy.sh cn-prod --service web-admin --version ${DEPLOY_VERSION}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - web-admin/**/*
      when: manual

# Deploy Relay to China Production
deploy:cn-prod:relay:
  stage: deploy
  needs:
    - job: build-relay
  tags:
    - deploy
    - linux
  variables:
    DEPLOY_VERSION: "${CI_COMMIT_SHORT_SHA}"
  environment:
    name: cn-production
    url: https://agentsmesh.cn
  script:
    - echo "Deploying Relay ${DEPLOY_VERSION} to China Production..."
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && git pull origin main"
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && ./deploy.sh cn-prod --service relay --version ${DEPLOY_VERSION}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - relay/**/*
      when: manual

# =============================================================================
# Database Migration - Manual trigger only
# =============================================================================
# Run database migrations using golang-migrate inside the backend container.
# This job requires manual trigger and should be run BEFORE deploying backend
# when there are schema changes.
#
# Usage:
#   - Click Play button to run all pending migrations (up)
#   - Set MIGRATE_DIRECTION=down and MIGRATE_STEPS=1 to rollback last migration

# Database Migration for China Production
migrate:cn-prod:
  stage: deploy
  when: manual
  tags:
    - deploy
    - linux
  variables:
    MIGRATE_DIRECTION: "up"      # up or down
    MIGRATE_STEPS: ""            # empty for all, or number for specific steps
  environment:
    name: cn-production
    url: https://agentsmesh.cn
  script:
    - echo "Running database migration (${MIGRATE_DIRECTION}) on China Production..."
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && git pull origin main"
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && ./migrate.sh cn-prod --direction ${MIGRATE_DIRECTION} ${MIGRATE_STEPS:+--steps $MIGRATE_STEPS}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - backend/migrations/**/*
      when: manual
