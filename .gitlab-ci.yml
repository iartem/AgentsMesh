# Include runner release pipeline (triggered by tags)
include:
  - local: 'runner/.gitlab-ci.yml'
    rules:
      - if: $CI_COMMIT_TAG

variables:
  REGISTRY: registry.corp.agentsmesh.ai
  BACKEND_IMAGE: ${REGISTRY}/agentsmesh/backend
  WEB_IMAGE: ${REGISTRY}/agentsmesh/web
  WEB_ADMIN_IMAGE: ${REGISTRY}/agentsmesh/web-admin
  RUNNER_IMAGE: ${REGISTRY}/agentsmesh/runner
  RELAY_IMAGE: ${REGISTRY}/agentsmesh/relay
  VERSION: ${CI_COMMIT_TAG:-dev}
  GO_VERSION: "1.24"
  # Use China Go proxy for faster module downloads
  GOPROXY: "https://goproxy.cn,https://goproxy.io,direct"
  GOSUMDB: "sum.golang.google.cn"

stages:
  - test
  - build
  - package
  - release
  - deploy

# =============================================================================
# Test Stage - Run on MR pipelines
# =============================================================================

# Test backend (Go)
test-backend:
  stage: test
  tags:
    - x86
    - docker
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache gcc musl-dev git
    - go install gotest.tools/gotestsum@latest
    - go install github.com/boumenot/gocover-cobertura@latest
  script:
    - cd backend
    - gotestsum --junitfile report.xml -- -race -coverprofile=coverage.out -covermode=atomic ./...
    - go tool cover -func=coverage.out
    - gocover-cobertura < coverage.out > coverage.xml
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    reports:
      junit: backend/report.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    paths:
      - backend/coverage.out
      - backend/coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - backend/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

# Test web (Next.js/Vitest)
test-web:
  stage: test
  tags:
    - x86
    - docker
  image: node:20-alpine
  before_script:
    - corepack enable
  script:
    - cd web
    - pnpm install --frozen-lockfile
    - pnpm lint
    - pnpm test:run --coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    reports:
      junit: web/report.xml
      coverage_report:
        coverage_format: cobertura
        path: web/coverage/cobertura-coverage.xml
    paths:
      - web/coverage/
      - web/report.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - web/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

# Test runner (Go)
test-runner:
  stage: test
  tags:
    - x86
    - docker
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache gcc musl-dev git
    - go install gotest.tools/gotestsum@latest
    - go install github.com/boumenot/gocover-cobertura@latest
  script:
    - cd runner
    # Exclude internal/tray package which requires pkg-config and GUI dependencies
    # Use -race to detect race conditions
    - gotestsum --junitfile report.xml -- -race -coverprofile=coverage.out -covermode=atomic $(go list ./... | grep -v /internal/tray)
    - go tool cover -func=coverage.out
    - gocover-cobertura < coverage.out > coverage.xml
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    reports:
      junit: runner/report.xml
      coverage_report:
        coverage_format: cobertura
        path: runner/coverage.xml
    paths:
      - runner/coverage.out
      - runner/coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - runner/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

# Test relay (Go)
test-relay:
  stage: test
  tags:
    - x86
    - docker
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache gcc musl-dev git
    - go install gotest.tools/gotestsum@latest
    - go install github.com/boumenot/gocover-cobertura@latest
  script:
    - cd relay
    - gotestsum --junitfile report.xml -- -race -coverprofile=coverage.out -covermode=atomic ./...
    - go tool cover -func=coverage.out
    - gocover-cobertura < coverage.out > coverage.xml
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    reports:
      junit: relay/report.xml
      coverage_report:
        coverage_format: cobertura
        path: relay/coverage.xml
    paths:
      - relay/coverage.out
      - relay/coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - relay/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

# =============================================================================
# Build Verification - Run on MR pipelines (no push)
# =============================================================================
# These jobs verify that the code compiles successfully without pushing images.
# This catches build errors before merging to main.

# Verify backend build (MR only)
verify-build-backend:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    - docker build --build-arg REGISTRY=${REGISTRY} -f ci/backend.Dockerfile -t backend-verify:${CI_COMMIT_SHORT_SHA} .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - backend/**/*
        - proto/**/*
        - ci/backend.Dockerfile

# Verify web build (MR only)
verify-build-web:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    - cd web
    - docker build --build-arg REGISTRY=${REGISTRY} -f ../ci/web.Dockerfile -t web-verify:${CI_COMMIT_SHORT_SHA} .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - web/**/*
        - ci/web.Dockerfile

# Verify web-admin build (MR only)
verify-build-web-admin:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    - cd web-admin
    - docker build --build-arg REGISTRY=${REGISTRY} -f ../ci/web-admin.Dockerfile -t web-admin-verify:${CI_COMMIT_SHORT_SHA} .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - web-admin/**/*
        - ci/web-admin.Dockerfile

# Verify runner build (MR only)
verify-build-runner:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    - docker build --build-arg REGISTRY=${REGISTRY} -f ci/runner.Dockerfile -t runner-verify:${CI_COMMIT_SHORT_SHA} .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - runner/**/*
        - proto/**/*
        - ci/runner.Dockerfile

# Verify relay build (MR only)
verify-build-relay:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    - docker build --build-arg REGISTRY=${REGISTRY} -f ci/relay.Dockerfile -t relay-verify:${CI_COMMIT_SHORT_SHA} .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - relay/**/*
        - ci/relay.Dockerfile

# =============================================================================
# Build Stage - Run on main branch (push to registry)
# =============================================================================

# Build backend image
build-backend:
  stage: build
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    # Build from project root to include proto/ directory
    - docker build --build-arg REGISTRY=${REGISTRY} -f ci/backend.Dockerfile -t ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${BACKEND_IMAGE}:latest .
    - docker push ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${BACKEND_IMAGE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - backend/**/*
        - proto/**/*
        - ci/backend.Dockerfile
    - if: $CI_PIPELINE_SOURCE == "web"

# Build web image
build-web:
  stage: build
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    - cd web
    - docker build --build-arg REGISTRY=${REGISTRY} -f ../ci/web.Dockerfile -t ${WEB_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${WEB_IMAGE}:latest .
    - docker push ${WEB_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${WEB_IMAGE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - web/**/*
        - ci/web.Dockerfile
    - if: $CI_PIPELINE_SOURCE == "web"

