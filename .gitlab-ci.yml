# Include runner release pipeline (triggered by tags)
include:
  - local: 'runner/.gitlab-ci.yml'
    rules:
      - if: $CI_COMMIT_TAG

variables:
  REGISTRY: registry.corp.agentsmesh.ai
  BACKEND_IMAGE: ${REGISTRY}/agentsmesh/backend
  WEB_IMAGE: ${REGISTRY}/agentsmesh/web
  WEB_ADMIN_IMAGE: ${REGISTRY}/agentsmesh/web-admin
  RUNNER_IMAGE: ${REGISTRY}/agentsmesh/runner
  VERSION: ${CI_COMMIT_TAG:-dev}
  GO_VERSION: "1.24"

stages:
  - test
  - build
  - package
  - release
  - deploy

# =============================================================================
# Test Stage - Run on MR pipelines
# =============================================================================

# Test backend (Go)
test-backend:
  stage: test
  tags:
    - amd64
    - docker
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache gcc musl-dev git
    - go install gotest.tools/gotestsum@latest
    - go install github.com/boumenot/gocover-cobertura@latest
  script:
    - cd backend
    - gotestsum --junitfile report.xml -- -race -coverprofile=coverage.out -covermode=atomic ./...
    - go tool cover -func=coverage.out
    - gocover-cobertura < coverage.out > coverage.xml
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    reports:
      junit: backend/report.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    paths:
      - backend/coverage.out
      - backend/coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - backend/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

# Test web (Next.js/Vitest)
test-web:
  stage: test
  tags:
    - amd64
    - docker
  image: node:20-alpine
  before_script:
    - corepack enable
  script:
    - cd web
    - pnpm install --frozen-lockfile
    - pnpm lint
    - pnpm test:run --coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    reports:
      junit: web/report.xml
      coverage_report:
        coverage_format: cobertura
        path: web/coverage/cobertura-coverage.xml
    paths:
      - web/coverage/
      - web/report.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - web/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

# Test runner (Go)
test-runner:
  stage: test
  tags:
    - amd64
    - docker
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache gcc musl-dev git
    - go install gotest.tools/gotestsum@latest
    - go install github.com/boumenot/gocover-cobertura@latest
  script:
    - cd runner
    # Exclude internal/tray package which requires pkg-config and GUI dependencies
    # Use -race to detect race conditions
    - gotestsum --junitfile report.xml -- -race -coverprofile=coverage.out -covermode=atomic $(go list ./... | grep -v /internal/tray)
    - go tool cover -func=coverage.out
    - gocover-cobertura < coverage.out > coverage.xml
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    reports:
      junit: runner/report.xml
      coverage_report:
        coverage_format: cobertura
        path: runner/coverage.xml
    paths:
      - runner/coverage.out
      - runner/coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - runner/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

# =============================================================================
# Build Stage - Run on main branch
# =============================================================================

# Build backend image
build-backend:
  stage: build
  tags:
    - amd64
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    # Build from project root to include proto/ directory
    - docker build --build-arg REGISTRY=${REGISTRY} -f ci/backend.Dockerfile -t ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${BACKEND_IMAGE}:latest .
    - docker push ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${BACKEND_IMAGE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - backend/**/*
        - proto/**/*
        - ci/backend.Dockerfile
    - if: $CI_PIPELINE_SOURCE == "web"

# Build web image
build-web:
  stage: build
  tags:
    - amd64
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    - cd web
    - docker build --build-arg REGISTRY=${REGISTRY} -f ../ci/web.Dockerfile -t ${WEB_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${WEB_IMAGE}:latest .
    - docker push ${WEB_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${WEB_IMAGE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - web/**/*
        - ci/web.Dockerfile
    - if: $CI_PIPELINE_SOURCE == "web"

# Build web-admin image
build-web-admin:
  stage: build
  tags:
    - amd64
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    - cd web-admin
    - docker build --build-arg REGISTRY=${REGISTRY} -f ../ci/web-admin.Dockerfile -t ${WEB_ADMIN_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${WEB_ADMIN_IMAGE}:latest .
    - docker push ${WEB_ADMIN_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${WEB_ADMIN_IMAGE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - web-admin/**/*
        - ci/web-admin.Dockerfile
    - if: $CI_PIPELINE_SOURCE == "web"

# Build runner image
build-runner:
  stage: build
  tags:
    - amd64
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    # Build from project root to include proto/ directory
    - docker build --build-arg REGISTRY=${REGISTRY} -f ci/runner.Dockerfile -t ${RUNNER_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${RUNNER_IMAGE}:latest .
    - docker push ${RUNNER_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${RUNNER_IMAGE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - runner/**/*
        - proto/**/*
        - ci/runner.Dockerfile
    - if: $CI_PIPELINE_SOURCE == "web"

# =============================================================================
# Deploy Stage - Per-service manual deployment to production
# =============================================================================
# Each service has its own deploy job with manual trigger (Play button).
# DEPLOY_VERSION defaults to CI_COMMIT_SHORT_SHA but can be overridden for rollback.
#
# Usage:
#   - Normal deploy: Click Play button, uses current commit SHA
#   - Rollback: Click Play ▼, modify DEPLOY_VERSION to target SHA, run

# Deploy Backend to China Production
deploy:cn-prod:backend:
  stage: deploy
  needs:
    - job: build-backend
  when: manual
  tags:
    - deploy
    - linux
  variables:
    DEPLOY_VERSION: "${CI_COMMIT_SHORT_SHA}"
  environment:
    name: cn-production
    url: https://agentsmesh.cn
  script:
    - echo "Deploying Backend ${DEPLOY_VERSION} to China Production..."
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && git pull origin main"
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && ./deploy.sh cn-prod --service backend --version ${DEPLOY_VERSION}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - backend/**/*
        - proto/**/*

# Deploy Web to China Production
deploy:cn-prod:web:
  stage: deploy
  needs:
    - job: build-web
  when: manual
  tags:
    - deploy
    - linux
  variables:
    DEPLOY_VERSION: "${CI_COMMIT_SHORT_SHA}"
  environment:
    name: cn-production
    url: https://agentsmesh.cn
  script:
    - echo "Deploying Web ${DEPLOY_VERSION} to China Production..."
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && git pull origin main"
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && ./deploy.sh cn-prod --service web --version ${DEPLOY_VERSION}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - web/**/*

# Deploy Web-Admin to China Production
deploy:cn-prod:web-admin:
  stage: deploy
  needs:
    - job: build-web-admin
  when: manual
  tags:
    - deploy
    - linux
  variables:
    DEPLOY_VERSION: "${CI_COMMIT_SHORT_SHA}"
  environment:
    name: cn-production
    url: https://admin.agentsmesh.cn
  script:
    - echo "Deploying Web-Admin ${DEPLOY_VERSION} to China Production..."
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && git pull origin main"
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && ./deploy.sh cn-prod --service web-admin --version ${DEPLOY_VERSION}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - web-admin/**/*
