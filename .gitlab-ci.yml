# Include runner release pipeline (triggered by tags)
include:
  - local: 'runner/.gitlab-ci.yml'
    rules:
      - if: $CI_COMMIT_TAG

variables:
  REGISTRY: registry.corp.agentsmesh.ai
  BACKEND_IMAGE: ${REGISTRY}/agentsmesh/backend
  WEB_IMAGE: ${REGISTRY}/agentsmesh/web
  RUNNER_IMAGE: ${REGISTRY}/agentsmesh/runner
  VERSION: ${CI_COMMIT_TAG:-dev}
  GO_VERSION: "1.24"

stages:
  - test
  - build
  - package
  - release

# =============================================================================
# Test Stage - Run on MR pipelines
# =============================================================================

# Test backend (Go)
test-backend:
  stage: test
  tags:
    - amd64
    - docker
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache gcc musl-dev git
    - go install gotest.tools/gotestsum@latest
    - go install github.com/boumenot/gocover-cobertura@latest
  script:
    - cd backend
    - gotestsum --junitfile report.xml -- -race -coverprofile=coverage.out -covermode=atomic ./...
    - go tool cover -func=coverage.out
    - gocover-cobertura < coverage.out > coverage.xml
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    reports:
      junit: backend/report.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    paths:
      - backend/coverage.out
      - backend/coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - backend/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

# Test web (Next.js/Vitest)
test-web:
  stage: test
  tags:
    - amd64
    - docker
  image: node:20-alpine
  before_script:
    - corepack enable
  script:
    - cd web
    - pnpm install --frozen-lockfile
    - pnpm lint
    - pnpm test:run --coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    reports:
      junit: web/report.xml
      coverage_report:
        coverage_format: cobertura
        path: web/coverage/cobertura-coverage.xml
    paths:
      - web/coverage/
      - web/report.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - web/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

# Test runner (Go)
test-runner:
  stage: test
  tags:
    - amd64
    - docker
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache gcc musl-dev git
    - go install gotest.tools/gotestsum@latest
    - go install github.com/boumenot/gocover-cobertura@latest
  script:
    - cd runner
    # Exclude internal/tray package which requires pkg-config and GUI dependencies
    # Use -race to detect race conditions
    - gotestsum --junitfile report.xml -- -race -coverprofile=coverage.out -covermode=atomic $(go list ./... | grep -v /internal/tray)
    - go tool cover -func=coverage.out
    - gocover-cobertura < coverage.out > coverage.xml
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    reports:
      junit: runner/report.xml
      coverage_report:
        coverage_format: cobertura
        path: runner/coverage.xml
    paths:
      - runner/coverage.out
      - runner/coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - runner/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

# =============================================================================
# Build Stage - Run on main branch
# =============================================================================

# Build backend image
build-backend:
  stage: build
  tags:
    - amd64
    - docker
  image: docker:latest
  services:
    - docker:dind
  script:
    # Build from project root to include proto/ directory
    - docker build --build-arg REGISTRY=${REGISTRY} -f ci/backend.Dockerfile -t ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${BACKEND_IMAGE}:latest .
    - docker push ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${BACKEND_IMAGE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - backend/**/*
        - proto/**/*
        - ci/backend.Dockerfile
    - if: $CI_PIPELINE_SOURCE == "web"

# Build web image
build-web:
  stage: build
  tags:
    - amd64
    - docker
  image: docker:latest
  services:
    - docker:dind
  script:
    - cd web
    - docker build --build-arg REGISTRY=${REGISTRY} -f ../ci/web.Dockerfile -t ${WEB_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${WEB_IMAGE}:latest .
    - docker push ${WEB_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${WEB_IMAGE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - web/**/*
        - ci/web.Dockerfile
    - if: $CI_PIPELINE_SOURCE == "web"

# Build runner image
build-runner:
  stage: build
  tags:
    - amd64
    - docker
  image: docker:latest
  services:
    - docker:dind
  script:
    # Build from project root to include proto/ directory
    - docker build --build-arg REGISTRY=${REGISTRY} -f ci/runner.Dockerfile -t ${RUNNER_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${RUNNER_IMAGE}:latest .
    - docker push ${RUNNER_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${RUNNER_IMAGE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - runner/**/*
        - proto/**/*
        - ci/runner.Dockerfile
    - if: $CI_PIPELINE_SOURCE == "web"
