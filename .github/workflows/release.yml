name: Release

on:
  push:
    tags:
      - "v*"

env:
  DOCKERHUB_NAMESPACE: agentsmesh
  GO_VERSION: "1.25"

jobs:
  # ===========================================================================
  # Build and push Docker images
  # ===========================================================================

  build-images:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: ci/backend.Dockerfile
            context: .
          - service: web
            dockerfile: ci/web.Dockerfile
            context: ./web
          - service: web-admin
            dockerfile: ci/web-admin.Dockerfile
            context: ./web-admin
          - service: runner
            dockerfile: ci/runner.Dockerfile
            context: .
          - service: relay
            dockerfile: ci/relay.Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64,linux/arm64

  # ===========================================================================
  # Build Runner CLI + Create GitHub Release
  # ===========================================================================

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-images]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: runner/go.sum

      - name: Build with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=publish
          workdir: runner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release with runner binaries
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            runner/dist/*.tar.gz
            runner/dist/*.zip
            runner/dist/*.deb
            runner/dist/*.rpm
            runner/dist/*.apk
            runner/dist/checksums.txt
