name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

env:
  DOCKERHUB_NAMESPACE: agentsmesh
  GO_VERSION: "1.25"

jobs:
  # ===========================================================================
  # Build and push Docker images (server-side services)
  # main push: backend, web, web-admin, relay (short sha tag)
  # v* tag:    backend, web, web-admin, relay (semver tags)
  # ===========================================================================

  build-images:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: ci/backend.Dockerfile
            context: .
          - service: web
            dockerfile: ci/web.Dockerfile
            context: ./web
          - service: web-admin
            dockerfile: ci/web-admin.Dockerfile
            context: ./web-admin
          - service: relay
            dockerfile: ci/relay.Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.service }}
          tags: |
            # main branch: short sha only
            type=sha,enable={{is_default_branch}}
            # version tags: v1.0.0, v1.0
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64,linux/arm64

  # ===========================================================================
  # Build Runner CLI + Create GitHub Release (tag only)
  # Runner is a client-side binary distributed via GitHub Release, not Docker.
  # ===========================================================================

  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-images]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: runner/go.sum

      - name: Install rcodesign (macOS code signing)
        run: |
          RCODESIGN_VERSION="0.27.0"
          curl -fsSL "https://github.com/indygreg/apple-codesign/releases/download/${RCODESIGN_VERSION}/apple-codesign-${RCODESIGN_VERSION}-x86_64-unknown-linux-musl.tar.gz" | tar xz
          sudo cp ./apple-codesign-*/rcodesign /usr/local/bin/

      - name: Release with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: runner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
