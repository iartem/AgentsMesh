# Upstream definitions
upstream backend {
    server backend:8080;
}

# Development server (HTTP only)
# Frontend runs locally (not in Docker) for better performance
server {
    listen 80;
    server_name _;

    # Increase buffer sizes for development
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # API routes
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long timeout for WebSocket connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Frontend info - redirect to local dev server
    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
<html>
<head><title>AgentsMesh Dev</title></head>
<body style="font-family: system-ui; padding: 40px; max-width: 600px; margin: 0 auto;">
<h1>AgentsMesh Development</h1>
<p>Frontend runs locally for better performance.</p>
<p><strong>Access the app at:</strong> <a href="http://localhost:3000">http://localhost:3000</a></p>
<p><strong>API endpoint:</strong> <a href="/api/v1/health">/api/v1/health</a></p>
<hr>
<p style="color: #666;">This nginx server only proxies API requests. Check <code>deploy/dev/.env</code> for the actual frontend port (WEB_PORT).</p>
</body>
</html>';
    }
}
