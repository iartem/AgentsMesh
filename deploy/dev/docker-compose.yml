# Docker Compose for AgentsMesh Development
#
# 多 Worktree 支持：
# 每个 worktree 可以独立运行，通过以下方式隔离：
# 1. COMPOSE_PROJECT_NAME - 自动为容器、网络、卷添加前缀
# 2. 端口环境变量 - 避免端口冲突
#
# 快速开始：
#   ./init-worktree.sh  # 自动生成 .env 配置
#   docker compose up -d
#
# 手动配置：
#   cp .env.example .env
#   # 编辑 .env 设置 COMPOSE_PROJECT_NAME 和端口

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentsmesh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentsmesh_dev}
      POSTGRES_DB: agentsmesh
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentsmesh"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO object storage (S3 compatible)
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer (database management UI)
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    depends_on:
      - postgres

  # Backend API server with hot reload
  backend:
    build:
      context: ../../backend
      dockerfile: ../deploy/dev/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=agentsmesh
      - DB_PASSWORD=${POSTGRES_PASSWORD:-agentsmesh_dev}
      - DB_NAME=agentsmesh
      - DB_SSLMODE=disable
      # Redis
      - REDIS_URL=redis://redis:6379
      # Auth
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-production}
      # Server
      - SERVER_ADDRESS=:8080
      - DEBUG=true
      - CORS_ALLOWED_ORIGINS=http://localhost:${HTTP_PORT:-80},http://127.0.0.1:${HTTP_PORT:-80},http://localhost,http://127.0.0.1,http://192.168.100.189
      # Logging
      - LOG_LEVEL=debug
      - LOG_FORMAT=text
      - LOG_FILE=/app/logs/agentsmesh.log
      # Email
      - EMAIL_PROVIDER=console
      - FRONTEND_BASE_URL=http://localhost:${HTTP_PORT:-80}
      # OAuth - GitHub
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_REDIRECT_URL=http://localhost:${HTTP_PORT:-80}/api/v1/auth/oauth/github/callback
      # Storage (MinIO/S3)
      - STORAGE_ENDPOINT=minio:9000
      - STORAGE_PUBLIC_ENDPOINT=localhost:${MINIO_API_PORT:-9000}
      - STORAGE_REGION=us-east-1
      - STORAGE_BUCKET=agentsmesh
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_USE_SSL=false
      - STORAGE_USE_PATH_STYLE=true
      - STORAGE_MAX_FILE_SIZE=10
      - STORAGE_ALLOWED_TYPES=image/jpeg,image/png,image/gif,image/webp,application/pdf
      # Payment Configuration
      - DEPLOYMENT_TYPE=${DEPLOYMENT_TYPE:-global}
      # Mock Payment (for testing without real payment providers)
      - PAYMENT_MOCK=${PAYMENT_MOCK:-false}
      - PAYMENT_MOCK_BASE_URL=${PAYMENT_MOCK_BASE_URL:-http://localhost}
      # Stripe
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      # Alipay
      - ALIPAY_APP_ID=${ALIPAY_APP_ID:-}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY:-}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY:-}
      - ALIPAY_NOTIFY_URL=http://localhost:${HTTP_PORT:-80}/api/v1/webhooks/alipay
      - ALIPAY_RETURN_URL=http://localhost:${HTTP_PORT:-80}
      - ALIPAY_SANDBOX=${ALIPAY_SANDBOX:-true}
      # WeChat Pay
      - WECHAT_APP_ID=${WECHAT_APP_ID:-}
      - WECHAT_MCH_ID=${WECHAT_MCH_ID:-}
      - WECHAT_API_KEY=${WECHAT_API_KEY:-}
      - WECHAT_APIV3_KEY=${WECHAT_APIV3_KEY:-}
      - WECHAT_NOTIFY_URL=http://localhost:${HTTP_PORT:-80}/api/v1/webhooks/wechat
      - WECHAT_SANDBOX=${WECHAT_SANDBOX:-true}
      # License (OnPremise)
      - LICENSE_PUBLIC_KEY_PATH=${LICENSE_PUBLIC_KEY_PATH:-}
      - LICENSE_FILE_PATH=${LICENSE_FILE_PATH:-}
    volumes:
      # Mount source code for hot reload
      - ../../backend:/app
      # Persist Go modules cache
      - go-mod-cache:/go/pkg/mod
      # Persist build cache
      - go-build-cache:/root/.cache/go-build
      # Persist logs
      - ../../backend/logs:/app/logs
    # No external port - accessed via nginx
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  # Next.js frontend with hot reload
  web:
    build:
      context: ../../web
      dockerfile: ../deploy/dev/web.Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # API URL points to nginx
      - NEXT_PUBLIC_API_URL=http://localhost:${HTTP_PORT:-80}
      - NEXT_PUBLIC_WS_URL=ws://localhost:${HTTP_PORT:-80}
      - NEXT_PUBLIC_GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      # Optimize for Docker environment
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      # Mount source code for hot reload
      - ../../web:/app
      # Use container's node_modules (compiled for Linux)
      - web_node_modules:/app/node_modules
    # No external port - accessed via nginx

  # Runner with hot reload (runs as non-root user for Claude Code compatibility)
  runner:
    build:
      context: ../../runner
      dockerfile: ../deploy/dev/runner.Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    user: "1000:1000"
    environment:
      # Backend connection (entrypoint script will wait for backend)
      - BACKEND_URL=ws://backend:8080
      # Runner identification (matches seed data in deploy/dev/seed/seed.sql)
      - RUNNER_NODE_ID=dev-runner
      - RUNNER_AUTH_TOKEN=dev-runner-auth-token
      - RUNNER_ORG_SLUG=dev-org
      # Capacity
      - MAX_CONCURRENT_PODS=10
      # Workspace
      - WORKSPACE=/workspace
      # Debug mode
      - DEBUG=true
      - HOME=/home/runner
    volumes:
      # Mount source code for hot reload
      - ../../runner:/app
      # Mount entrypoint script
      - ./runner-entrypoint.sh:/usr/local/bin/runner-entrypoint.sh:ro
      # Persist Go modules cache (for non-root user)
      - runner-go-mod-cache:/go/pkg/mod
      # Persist build cache (for non-root user)
      - runner-go-build-cache:/home/runner/.cache/go-build
      # Workspace for sandboxes
      - runner_workspace:/workspace
      # AgentsMesh config directory
      - runner_config:/home/runner/.agentsmesh
    # Use entrypoint script for auto-configuration
    entrypoint: ["/usr/local/bin/runner-entrypoint.sh"]
    # Runner communicates with backend internally, no external port needed

  # Nginx reverse proxy (unified entry point)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
      - web

volumes:
  postgres_data:
  redis_data:
  minio_data:
  go-mod-cache:
  go-build-cache:
  runner-go-mod-cache:
  runner-go-build-cache:
  runner_workspace:
  runner_config:
  web_node_modules:
