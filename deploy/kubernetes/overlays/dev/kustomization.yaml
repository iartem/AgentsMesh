apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agentmesh-dev

resources:
  - ../../base

namePrefix: dev-

commonLabels:
  environment: development

# Development-specific patches
patches:
  # Reduce replicas for development
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: web
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

# Development ConfigMap
configMapGenerator:
  - name: agentmesh-config
    behavior: merge
    literals:
      - LOG_LEVEL=debug
      - DEBUG=true
      - API_URL=http://localhost:8080

# Development secrets (for local development only)
secretGenerator:
  - name: agentmesh-secrets
    literals:
      - JWT_SECRET=dev-jwt-secret-change-in-production
      - DATABASE_URL=postgres://agentmesh:password@localhost:5432/agentmesh_dev?sslmode=disable
      - REDIS_URL=redis://localhost:6379/0
