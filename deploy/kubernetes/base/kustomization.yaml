apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agentmesh

resources:
  - namespace.yaml
  - backend-deployment.yaml
  - web-deployment.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/version: "1.0.0"
  app.kubernetes.io/managed-by: kustomize

images:
  - name: agentmesh/backend
    newTag: latest
  - name: agentmesh/web
    newTag: latest
