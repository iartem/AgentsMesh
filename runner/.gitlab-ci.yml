# GitLab CI/CD configuration for AgentsMesh Runner
#
# This pipeline builds CLI binaries via GoReleaser, then releases to GitHub.
#
# Required CI/CD Variables:
#   - GITHUB_RELEASE_TOKEN: GitHub PAT with repo access to AgentsMesh/AgentsMeshRunner
#
# Required Runners:
#   - Docker runner with tags: [x86, docker]

stages:
  - build
  - release

variables:
  VERSION: ${CI_COMMIT_TAG:-dev}
  GO_VERSION: "1.25"
  # Private registry to avoid Docker Hub pull failures
  REGISTRY: registry.corp.agentsmesh.ai

# =============================================================================
# CLI Build (GoReleaser - cross-compile all platforms)
# =============================================================================

build:cli:
  stage: build
  tags: [x86, docker]
  image:
    name: ${REGISTRY}/goreleaser/goreleaser:latest
    entrypoint: [""]
  variables:
    # GoReleaser requires GITHUB_TOKEN for Homebrew formula update
    GITHUB_TOKEN: ${GITHUB_RELEASE_TOKEN}
  script:
    - cd runner
    # GoReleaser builds CLI artifacts and updates Homebrew formula
    # GitHub release upload is skipped (skip_upload: true in .goreleaser.yml)
    # Actual GitHub release is handled by release:github job
    - goreleaser release --clean
  artifacts:
    paths:
      - runner/dist/*.tar.gz
      - runner/dist/*.zip
      - runner/dist/*.deb
      - runner/dist/*.rpm
      - runner/dist/*.apk
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_TAG

# =============================================================================
# Release to GitHub
# =============================================================================

release:github:
  stage: release
  tags: [x86, docker]
  image: ${REGISTRY}/library/alpine:latest
  needs:
    - job: build:cli
      artifacts: true
  before_script:
    - apk add --no-cache curl jq
  script:
    - sh runner/scripts/github-release.sh
  rules:
    - if: $CI_COMMIT_TAG
