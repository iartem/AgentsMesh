# GoReleaser configuration for AgentsMesh Runner
# https://goreleaser.com
#
# Release repository: https://github.com/AgentsMesh/AgentsMeshRunner
# This is a dedicated release repository for distributing pre-built binaries.

version: 2

project_name: agentsmesh-runner

before:
  hooks:
    - go mod tidy

builds:
  - id: runner-cli
    main: ./cmd/runner
    binary: agentsmesh-runner
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}

archives:
  - id: cli-archive
    builds:
      - runner-cli
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*
  # Separate archive for macOS universal binary
  - id: cli-archive-darwin-universal
    builds:
      - runner-universal
    name_template: "{{ .ProjectName }}_{{ .Version }}_darwin_all"
    files:
      - README.md
      - LICENSE*

# macOS universal binary (amd64 + arm64)
universal_binaries:
  - id: runner-universal
    ids:
      - runner-cli
    # replace: false to keep individual darwin builds for the archive
    # The universal binary will be created as a separate artifact
    replace: false
    name_template: "agentsmesh-runner"

# Linux packages using nfpm
nfpms:
  - id: runner-deb-rpm
    package_name: agentsmesh-runner
    builds:
      - runner-cli
    vendor: AgentsMesh
    homepage: https://agentsmesh.ai
    maintainer: AgentsMesh Team <support@agentsmesh.ai>
    description: |
      AgentsMesh Runner - AI Agent Task Executor

      Connects to AgentsMesh server and executes AI agent tasks
      in isolated terminal environments.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/local/bin
    contents:
      # Systemd service file
      - src: ./build/linux/runner.service
        dst: /etc/systemd/system/agentsmesh-runner.service
        type: config
      # Config directory
      - dst: /etc/agentsmesh
        type: dir
        file_info:
          mode: 0755
    scripts:
      postinstall: ./build/linux/postinst.sh
      preremove: ./build/linux/prerm.sh
    overrides:
      deb:
        dependencies:
          - systemd
        recommends:
          - git
      rpm:
        dependencies:
          - systemd
        recommends:
          - git
      apk:
        dependencies:
          - openrc

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# SBOM generation (requires syft, optional)
# sboms:
#   - artifacts: archive

# Signing with cosign (optional, enable in CI)
# signs:
#   - cmd: cosign
#     env:
#       - COSIGN_EXPERIMENTAL=1
#     certificate: "${artifact}.pem"
#     args:
#       - sign-blob
#       - "--output-certificate=${certificate}"
#       - "--output-signature=${signature}"
#       - "${artifact}"
#       - "--yes"
#     artifacts: checksum
#     output: true

changelog:
  # Use local git log since release repo is separate from source
  sort: asc
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "New Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Performance"
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "Other"
      order: 999

# Release to AgentsMesh/AgentsMeshRunner repository
# GitLab CI: GoReleaser builds only (skip_upload: true), then release:github job
#            uploads artifacts to AgentsMesh/AgentsMeshRunner via github-release.sh
# GitHub Actions: GoReleaser builds only (--skip=publish), then softprops/action-gh-release
#                 uploads artifacts to the current repository
release:
  github:
    owner: AgentsMesh
    name: AgentsMeshRunner

  # Skip GitHub release upload - handled by CI-specific release jobs
  skip_upload: true

  # Draft release for review before publishing
  draft: false

  # Auto-detect prerelease from tag (v1.0.0-beta.1)
  prerelease: auto

  # Release title
  name_template: "AgentsMesh Runner v{{.Version}}"

  # Release notes header
  header: |
    ## AgentsMesh Runner v{{.Version}}

    AgentsMesh Runner is an AI Agent task executor that connects to the AgentsMesh server and executes AI agent tasks in isolated terminal environments.

    ### Installation

    **macOS (Homebrew) - Recommended:**
    ```bash
    # Add tap
    brew tap agentsmesh/tap https://github.com/AgentsMesh/BrewCask

    # Install runner
    brew install agentsmesh/tap/agentsmesh-runner
    ```

    **macOS (Direct download):**
    ```bash
    # Intel or Apple Silicon (Universal binary)
    curl -fsSL https://github.com/AgentsMesh/AgentsMeshRunner/releases/download/v{{.Version}}/agentsmesh-runner_{{.Version}}_darwin_all.tar.gz | tar xz
    sudo mv agentsmesh-runner /usr/local/bin/
    ```

    **Linux (Debian/Ubuntu):**
    ```bash
    # x86_64
    wget https://github.com/AgentsMesh/AgentsMeshRunner/releases/download/v{{.Version}}/agentsmesh-runner_{{.Version}}_linux_amd64.deb
    sudo dpkg -i agentsmesh-runner_{{.Version}}_linux_amd64.deb

    # ARM64
    wget https://github.com/AgentsMesh/AgentsMeshRunner/releases/download/v{{.Version}}/agentsmesh-runner_{{.Version}}_linux_arm64.deb
    sudo dpkg -i agentsmesh-runner_{{.Version}}_linux_arm64.deb
    ```

    **Linux (RHEL/CentOS/Fedora):**
    ```bash
    # x86_64
    wget https://github.com/AgentsMesh/AgentsMeshRunner/releases/download/v{{.Version}}/agentsmesh-runner_{{.Version}}_linux_amd64.rpm
    sudo rpm -i agentsmesh-runner_{{.Version}}_linux_amd64.rpm

    # ARM64
    wget https://github.com/AgentsMesh/AgentsMeshRunner/releases/download/v{{.Version}}/agentsmesh-runner_{{.Version}}_linux_arm64.rpm
    sudo rpm -i agentsmesh-runner_{{.Version}}_linux_arm64.rpm
    ```

    **Linux (Alpine):**
    ```bash
    # x86_64
    wget https://github.com/AgentsMesh/AgentsMeshRunner/releases/download/v{{.Version}}/agentsmesh-runner_{{.Version}}_linux_amd64.apk
    sudo apk add --allow-untrusted agentsmesh-runner_{{.Version}}_linux_amd64.apk
    ```

    **Linux (Direct download):**
    ```bash
    # x86_64
    curl -fsSL https://github.com/AgentsMesh/AgentsMeshRunner/releases/download/v{{.Version}}/agentsmesh-runner_{{.Version}}_linux_amd64.tar.gz | tar xz
    sudo mv agentsmesh-runner /usr/local/bin/
    ```

    **Windows:**
    Download `agentsmesh-runner_{{.Version}}_windows_amd64.zip` and extract to a directory in your PATH.

    ### Quick Start

    ```bash
    # Global: https://api.agentsmesh.ai (or your own server address)
    agentsmesh-runner register --server <SERVER_URL> --token YOUR_TOKEN

    # Start runner
    agentsmesh-runner run
    ```

    ### Run as System Service

    ```bash
    # Install service
    sudo agentsmesh-runner service install

    # Start service
    sudo agentsmesh-runner service start

    # Check status
    sudo agentsmesh-runner service status
    ```

  footer: |
    ---

    **Documentation**: https://agentsmesh.ai/docs/runner

# Homebrew tap - auto-update formula on release
brews:
  - name: agentsmesh-runner
    ids:
      - cli-archive
      - cli-archive-darwin-universal
    repository:
      owner: AgentsMesh
      name: BrewCask
      token: "{{ .Env.GITHUB_RELEASE_TOKEN }}"
    commit_author:
      name: AgentsMesh Bot
      email: bot@agentsmesh.ai
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Formula
    homepage: https://agentsmesh.ai
    description: "AgentsMesh Runner - AI Agent Task Executor"
    license: MIT
    install: |
      bin.install "agentsmesh-runner"
    caveats: |
      To get started with AgentsMesh Runner:

      1. Register the runner with your AgentsMesh server:
         # Global: https://api.agentsmesh.ai (or your own server address)
         agentsmesh-runner register --server <SERVER_URL> --token YOUR_TOKEN

      2. Start the runner:
         agentsmesh-runner run

      For more information, visit: https://agentsmesh.ai/docs/runner
    test: |
      system "#{bin}/agentsmesh-runner", "version"
    # skip_upload: auto  # Uncomment to skip upload for pre-releases

