# GoReleaser configuration for AgentsMesh Runner
# https://goreleaser.com
#
# Release repository: https://github.com/AgentsMesh/AgentsMesh
# Runner binaries are published as part of the main repository releases.

version: 2

project_name: agentsmesh-runner

before:
  hooks:
    - go mod tidy

builds:
  - id: runner-cli
    main: ./cmd/runner
    binary: agentsmesh-runner
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}
    hooks:
      post:
        - cmd: sh -c '[ "{{ .Os }}" = "darwin" ] && ./build/scripts/sign-darwin.sh "{{ .Path }}" || true'
          output: true
          env:
            - ENTITLEMENTS=./build/darwin/entitlements.plist

archives:
  - id: cli-archive
    ids:
      - runner-cli
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*
  # Separate archive for macOS universal binary
  - id: cli-archive-darwin-universal
    ids:
      - runner-universal
    name_template: "{{ .ProjectName }}_{{ .Version }}_darwin_all"
    files:
      - README.md
      - LICENSE*

# macOS universal binary (amd64 + arm64)
universal_binaries:
  - id: runner-universal
    ids:
      - runner-cli
    # replace: false to keep individual darwin builds for the archive
    # The universal binary will be created as a separate artifact
    replace: false
    name_template: "agentsmesh-runner"

# Linux packages using nfpm
nfpms:
  - id: runner-deb-rpm
    package_name: agentsmesh-runner
    ids:
      - runner-cli
    vendor: AgentsMesh
    homepage: https://agentsmesh.ai
    maintainer: AgentsMesh Team <support@agentsmesh.ai>
    description: |
      AgentsMesh Runner - AI Agent Task Executor

      Connects to AgentsMesh server and executes AI agent tasks
      in isolated terminal environments.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/local/bin
    contents:
      # Systemd service file
      - src: ./build/linux/runner.service
        dst: /etc/systemd/system/agentsmesh-runner.service
        type: config
      # Config directory
      - dst: /etc/agentsmesh
        type: dir
        file_info:
          mode: 0755
    scripts:
      postinstall: ./build/linux/postinst.sh
      preremove: ./build/linux/prerm.sh
    overrides:
      deb:
        dependencies:
          - systemd
        recommends:
          - git
      rpm:
        dependencies:
          - systemd
        recommends:
          - git
      apk:
        dependencies:
          - openrc

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# SBOM generation (requires syft, optional)
# sboms:
#   - artifacts: archive

# Signing with cosign (optional, enable in CI)
# signs:
