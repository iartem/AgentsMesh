changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "New Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Performance"
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "Other"
      order: 999

# Release to AgentsMesh/AgentsMesh repository (via GitHub Actions)
release:
  github:
    owner: AgentsMesh
    name: AgentsMesh

  draft: false

  # Auto-detect prerelease from tag (v1.0.0-beta.1)
  prerelease: auto

  # Release title
  name_template: "AgentsMesh Runner v{{.Version}}"

  # Release notes header
  header: |
    ## AgentsMesh Runner v{{.Version}}

    AgentsMesh Runner is an AI Agent task executor that connects to the AgentsMesh server and executes AI agent tasks in isolated terminal environments.

    ### Quick Install

    **macOS / Linux (one-line):**
    ```bash
    curl -fsSL https://agentsmesh.ai/install.sh | sh
    ```

    **Windows (PowerShell):**
    ```powershell
    irm https://agentsmesh.ai/install.ps1 | iex
    ```

    **macOS (Homebrew):**
    ```bash
    brew tap agentsmesh/tap https://github.com/AgentsMesh/BrewCask
    brew install agentsmesh/tap/agentsmesh-runner
    ```

    ### Quick Start

    ```bash
    # Register (Global: https://agentsmesh.ai or your own server)
    agentsmesh-runner register --server <SERVER_URL> --token YOUR_TOKEN

    # Start runner
    agentsmesh-runner run
    ```

    For full documentation, visit: https://agentsmesh.ai/docs/runners/setup

  footer: |
    ---

    **Documentation**: https://agentsmesh.ai/docs/runner

# Homebrew tap - auto-update formula on release
brews:
  - name: agentsmesh-runner
    ids:
      - cli-archive
      - cli-archive-darwin-universal
    repository:
      owner: AgentsMesh
      name: BrewCask
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: AgentsMesh Bot
      email: bot@agentsmesh.ai
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Formula
    homepage: https://agentsmesh.ai
    description: "AgentsMesh Runner - AI Agent Task Executor"
    license: MIT
    install: |
      bin.install "agentsmesh-runner"
    caveats: |
      To get started with AgentsMesh Runner:

      1. Register the runner with your AgentsMesh server:
         # Global: https://agentsmesh.ai (or your own server address)
         agentsmesh-runner register --server <SERVER_URL> --token YOUR_TOKEN

      2. Start the runner:
         agentsmesh-runner run

      For more information, visit: https://agentsmesh.ai/docs/runner
    test: |
      system "#{bin}/agentsmesh-runner", "version"
    # skip_upload: auto  # Uncomment to skip upload for pre-releases

