# Release workflow for AgentMesh Runner
# Triggers on version tags (v*) and releases to AgentsMesh/AgentsMeshRunner
#
# Required secrets:
#   - RELEASE_GITHUB_TOKEN: PAT with repo access to AgentsMesh/AgentsMeshRunner
#   - HOMEBREW_TAP_TOKEN: (optional) PAT for homebrew-tap repo
#   - SCOOP_BUCKET_TOKEN: (optional) PAT for scoop-bucket repo

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # For cosign signing

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft (for SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Use dedicated release token for AgentsMesh/AgentsMeshRunner
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}

  # Build and upload desktop version separately (requires CGO)
  release-desktop:
    name: Release Desktop
    needs: release
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build desktop binary
        run: |
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w -X main.version=${{ steps.version.outputs.VERSION }} -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o runner-desktop${{ matrix.goos == 'windows' && '.exe' || '' }} \
            ./cmd/runner
        shell: bash

      - name: Create archive (Unix)
        if: matrix.goos != 'windows'
        run: |
          tar -czvf agentmesh-runner-desktop_${{ steps.version.outputs.VERSION }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz \
            runner-desktop

      - name: Create archive (Windows)
        if: matrix.goos == 'windows'
        run: |
          7z a agentmesh-runner-desktop_${{ steps.version.outputs.VERSION }}_${{ matrix.goos }}_${{ matrix.goarch }}.zip \
            runner-desktop.exe
        shell: bash

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          repository: AgentsMesh/AgentsMeshRunner
          files: |
            agentmesh-runner-desktop_*
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}

  # Create macOS .app bundle and DMG
  release-macos-app:
    name: Release macOS App
    needs: release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build universal binary
        run: |
          # Build for amd64
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            go build -ldflags "-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o runner-amd64 ./cmd/runner

          # Build for arm64
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -ldflags "-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o runner-arm64 ./cmd/runner

          # Create universal binary
          lipo -create -output runner-desktop runner-amd64 runner-arm64

      - name: Create .app bundle
        run: |
          APP_NAME="AgentMesh Runner.app"
          mkdir -p "$APP_NAME/Contents/MacOS"
          mkdir -p "$APP_NAME/Contents/Resources"

          # Copy binary
          cp runner-desktop "$APP_NAME/Contents/MacOS/runner-desktop"
          chmod +x "$APP_NAME/Contents/MacOS/runner-desktop"

          # Copy Info.plist and update version
          sed "s/1.0.0/${{ steps.version.outputs.VERSION }}/g" \
            build/darwin/Info.plist > "$APP_NAME/Contents/Info.plist"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "AgentMesh Runner" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "AgentMesh Runner.app" 150 185 \
            --hide-extension "AgentMesh Runner.app" \
            --app-drop-link 450 185 \
            "AgentMesh-Runner-${{ steps.version.outputs.VERSION }}.dmg" \
            "AgentMesh Runner.app" || true

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          repository: AgentsMesh/AgentsMeshRunner
          files: |
            AgentMesh-Runner-*.dmg
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}
